<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#100f0d" />
  <title>Body Upgrade — Кузница Тела</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" aria-live="polite"></div>

  <nav class="tabbar" id="tabbar">
    <button class="tab" data-view="profile" data-icon="helm" aria-label="Профиль">
      <span class="tab-ico"></span><span>Герой</span>
    </button>
    <button class="tab" data-view="cycle" data-icon="anvil" aria-label="Цикл">
      <span class="tab-ico"></span><span>Кузница</span>
    </button>
    <button class="tab" data-view="buffs" data-icon="flask" aria-label="Баффы">
      <span class="tab-badge" id="buffs-badge" hidden></span>
      <span class="tab-ico"></span><span>Баффы</span>
    </button>
    <button class="tab" data-view="resources" data-icon="meat" aria-label="Ресурсы">
      <span class="tab-ico"></span><span>Ресурсы</span>
    </button>
    <button class="tab" data-view="progress" data-icon="scroll" aria-label="Прогресс">
      <span class="tab-ico"></span><span>Хроники</span>
    </button>
  </nav>

  <div id="overlay-root"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
