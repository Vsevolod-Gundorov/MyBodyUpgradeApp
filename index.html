<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#100f0d" />
  <title>Body Upgrade — Кузница Тела</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" aria-live="polite"></div>

  <nav class="tabbar" id="tabbar">
    <button class="tab" data-view="profile" aria-label="Профиль">
      <svg viewBox="0 0 24 24"><path d="M12 3l2.2 4.6L19 9l-3.5 3.4.8 5L12 15l-4.3 2.4.8-5L5 9l4.8-1.4z"/></svg>
      <span>Герой</span>
    </button>
    <button class="tab" data-view="cycle" aria-label="Цикл">
      <svg viewBox="0 0 24 24"><path d="M4 7h3v10H4zM17 7h3v10h-3zM8 10h8v4H8z"/></svg>
      <span>Кузница</span>
    </button>
    <button class="tab" data-view="buffs" aria-label="Баффы">
      <span class="tab-badge" id="buffs-badge" hidden></span>
      <svg viewBox="0 0 24 24"><path d="M9 2h6v2h-1v4.3l4.7 8.6A2 2 0 0 1 16.9 20H7.1a2 2 0 0 1-1.8-3.1L10 8.3V4H9V2zm1 7.6L8 13h8l-2-3.4V4h-4v5.6z"/></svg>
      <span>Баффы</span>
    </button>
    <button class="tab" data-view="progress" aria-label="Прогресс">
      <svg viewBox="0 0 24 24"><path d="M4 18l5-6 4 3 7-9v12H4z"/></svg>
      <span>Хроники</span>
    </button>
  </nav>

  <div id="overlay-root"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
